name: Run Soul Workflow

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/30 * * * *'

jobs:
  run_soul_workflow:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update apt and install Go
        run: |
          sudo apt update
          sudo apt install golang -y
          
      - name: Make binary executable
        run: chmod +x nova
        
      - name: Install required packages
        run: |
          python -m pip install --upgrade pip
          pip uninstall telegram -y || true
          pip install python-telegram-bot==20.7 PyGithub pymongo psutil aiohttp urllib3==1.26.5 certifi

      - name: Run soul.py
        run: python3 soul.py
